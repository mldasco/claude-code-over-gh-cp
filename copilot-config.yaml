litellm_settings:
  drop_params: true
  # Enable master key authentication
  master_key: os.environ/LITELLM_MASTER_KEY
  # Optional: Set request timeout
  request_timeout: 600

general_settings:
  # Require authentication for all requests
  enforce_authentication: true
  # Rate limiting: 100 requests per minute per user
  max_parallel_requests: 10
  global_max_parallel_requests: 20

model_list:
  - model_name: gpt-4
    litellm_params:
      model: github_copilot/gpt-4
      extra_headers: {"Editor-Version": "vscode/1.85.1", "Copilot-Integration-Id": "vscode-chat"}
  - model_name: claude-opus-4-6
    litellm_params:
      model: github_copilot/claude-opus-4.6
      extra_headers: {"Editor-Version": "vscode/1.85.1", "Copilot-Integration-Id": "vscode-chat"}
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: github_copilot/claude-sonnet-4.6
      extra_headers: {"Editor-Version": "vscode/1.85.1", "Copilot-Integration-Id": "vscode-chat"}
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: github_copilot/claude-sonnet-4.5
      extra_headers: {"Editor-Version": "vscode/1.85.1", "Copilot-Integration-Id": "vscode-chat"}
  - model_name: claude-haiku-4-5
    litellm_params:
      model: github_copilot/claude-haiku-4.5
      extra_headers: {"Editor-Version": "vscode/1.85.1", "Copilot-Integration-Id": "vscode-chat"}
